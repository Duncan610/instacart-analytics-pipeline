name: 'instacart_pipeline'
version: '1.0.0'
config-version: 2

profile: 'instacart_pipeline'

model-paths:    ["models"]
test-paths:     ["tests"]
macro-paths:    ["macros"]
seed-paths:     ["seeds"]
analysis-paths: ["analyses"]
target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  instacart_pipeline:

    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: ephemeral

    marts:
      core:
        +materialized: table
        +schema: marts_core
      marketing:
        +materialized: table
        +schema: marts_marketing
      product:
        +materialized: table
        +schema: marts_product