version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: instacart-postgres
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: instacart
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "analytics"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    build: .
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://analytics:analytics@postgres/instacart
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'instacart-pipeline-secret-key-2024'
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: '300'
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      - airflow-init
    command: webserver
    ports:
      - "8080:8080"
      - "8793:8793"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://analytics:analytics@postgres/instacart
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'instacart-pipeline-secret-key-2024'
      AIRFLOW__LOGGING__REMOTE_LOGGING: 'false'
      AIRFLOW__WEBSERVER__WORKERS: '1'
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: '300'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project
      - airflow-logs:/opt/airflow/logs

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      - airflow-init
    command: scheduler
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://analytics:analytics@postgres/instacart
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'instacart-pipeline-secret-key-2024'
      AIRFLOW__LOGGING__REMOTE_LOGGING: 'false'
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: '300'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project
      - airflow-logs:/opt/airflow/logs

volumes:
  postgres-data:
  airflow-logs:

