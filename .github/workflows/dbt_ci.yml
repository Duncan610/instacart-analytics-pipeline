name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'dbt_project/**'

jobs:
  dbt_ci:
    name: dbt Slim CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics
          POSTGRES_DB: instacart_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-postgres==1.8.2

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          instacart_pipeline:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: analytics
                password: analytics
                dbname: instacart_ci
                schema: dbt_ci
                threads: 4
          EOF

      - name: Create raw schema and tables in CI
        run: |
          PGPASSWORD=analytics psql -h localhost -U analytics -d instacart_ci -c "
            CREATE SCHEMA IF NOT EXISTS raw;
            CREATE TABLE IF NOT EXISTS raw.orders (
              order_id INT, user_id INT, eval_set TEXT,
              order_number INT, order_dow INT,
              order_hour_of_day INT, days_since_prior_order FLOAT
            );
            CREATE TABLE IF NOT EXISTS raw.products (
              product_id INT, product_name TEXT,
              aisle_id INT, department_id INT
            );
            CREATE TABLE IF NOT EXISTS raw.aisles (
              aisle_id INT, aisle TEXT
            );
            CREATE TABLE IF NOT EXISTS raw.departments (
              department_id INT, department TEXT
            );
            CREATE TABLE IF NOT EXISTS raw.order_products_prior (
              order_id INT, product_id INT,
              add_to_cart_order INT, reordered INT
            );
            CREATE TABLE IF NOT EXISTS raw.order_products_train (
              order_id INT, product_id INT,
              add_to_cart_order INT, reordered INT
            );"

      - name: Install dbt packages
        run: cd dbt_project && dbt deps

      - name: dbt compile
        run: cd dbt_project && dbt compile --target ci

      - name: dbt build models only
        run: cd dbt_project && dbt build --target ci --exclude source:*
